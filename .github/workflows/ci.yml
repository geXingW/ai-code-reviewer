name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check Markdown files exist
        run: |
          ls -la README.md LICENSE CONTRIBUTING.md CHANGELOG.md SECURITY.md CODE_OF_CONDUCT.md
          ls -la docs/ARCHITECTURE.md

  commitlint:
    name: Commit Message Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm install --no-save @commitlint/cli @commitlint/config-conventional
      - name: Validate commit messages
        run: |
          npx commitlint \
            --from origin/${{ github.base_ref }} \
            --to HEAD \
            --verbose

  backend-test:
    name: Backend Tests (${{ matrix.db.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db:
          - name: postgres
            image: postgres:15-alpine
            env:
              POSTGRES_USER: ai_reviewer
              POSTGRES_PASSWORD: ai_reviewer
              POSTGRES_DB: ai_code_reviewer
            port: 5432
            health_cmd: pg_isready -U ai_reviewer -d ai_code_reviewer
            dsn: postgresql+asyncpg://ai_reviewer:ai_reviewer@localhost:5432/ai_code_reviewer
          - name: mysql
            image: mysql:8.0
            env:
              MYSQL_ROOT_PASSWORD: ai_reviewer_root
              MYSQL_DATABASE: ai_code_reviewer
              MYSQL_USER: ai_reviewer
              MYSQL_PASSWORD: ai_reviewer
            port: 3306
            health_cmd: mysqladmin ping -h localhost -u root -pai_reviewer_root
            dsn: mysql+aiomysql://ai_reviewer:${{ matrix.db.env.MYSQL_PASSWORD }}@localhost:3306/ai_code_reviewer
    services:
      db:
        image: ${{ matrix.db.image }}
        env: ${{ matrix.db.env }}
        ports:
          - ${{ matrix.db.port }}:${{ matrix.db.port }}
        options: >-
          --health-cmd "${{ matrix.db.health_cmd }}"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: ${{ matrix.db.dsn }}
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: CHANGE_ME_FERNET_KEY_GENERATE_WITH_Fernet.generate_key
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: pip install -e "backend[dev]"
      - name: Lint backend
        run: ruff check .
        working-directory: backend
      - name: Type check backend
        run: mypy app
        working-directory: backend
      - name: Test backend
        run: pytest
        working-directory: backend
