name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown files exist
        run: |
          ls -la README.md LICENSE CONTRIBUTING.md CHANGELOG.md SECURITY.md CODE_OF_CONDUCT.md
          ls -la docs/ARCHITECTURE.md

  commitlint:
    name: Commit Message Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-save @commitlint/cli @commitlint/config-conventional
      - name: Validate commit messages
        run: |
          npx commitlint \
            --from origin/${{ github.base_ref }} \
            --to HEAD \
            --verbose

  backend-test-postgres:
    name: Backend Tests (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ai_reviewer
          POSTGRES_PASSWORD: ai_reviewer
          POSTGRES_DB: ai_code_reviewer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ai_reviewer -d ai_code_reviewer"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://ai_reviewer:ai_reviewer@localhost:5432/ai_code_reviewer
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: P2QaeSd-WxWj1b44aFQc47nYTK0weRp3ZXHBrHapKms=
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: pip install -e "backend[dev]"
      - name: Lint backend
        run: ruff check .
        working-directory: backend
      - name: Type check backend
        run: mypy app
        working-directory: backend
      - name: Test backend
        run: pytest
        working-directory: backend

  backend-test-mysql:
    name: Backend Tests (MySQL)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ai_reviewer_root
          MYSQL_DATABASE: ai_code_reviewer
          MYSQL_USER: ai_reviewer
          MYSQL_PASSWORD: ai_reviewer
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -pai_reviewer_root"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: mysql+aiomysql://ai_reviewer:ai_reviewer@localhost:3306/ai_code_reviewer
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: P2QaeSd-WxWj1b44aFQc47nYTK0weRp3ZXHBrHapKms=
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: pip install -e "backend[dev]"
      - name: Lint backend
        run: ruff check .
        working-directory: backend
      - name: Type check backend
        run: mypy app
        working-directory: backend
      - name: Test backend
        run: pytest
        working-directory: backend
