services:
  postgres:
    profiles: ["postgres"]
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_reviewer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_reviewer}
      POSTGRES_DB: ${POSTGRES_DB:-ai_code_reviewer}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-ai_reviewer} -d $${POSTGRES_DB:-ai_code_reviewer}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  # MySQL 备选数据库：默认不启动，仅在 --profile mysql 时拉起，用于跨方言验证。
  mysql:
    profiles: ["mysql"]
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ai_reviewer_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_code_reviewer}
      MYSQL_USER: ${MYSQL_USER:-ai_reviewer}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ai_reviewer}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-ai_reviewer_root}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    profiles: ["redis"]
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "alembic upgrade head && python scripts/seed.py &&
      if [ \"$${BACKEND_RELOAD:-false}\" = \"true\" ]; then
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload;
      else
      uvicorn app.main:app --host 0.0.0.0 --port 8000;
      fi"
    env_file:
      - path: .env
        required: false
    environment:
#      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ai_reviewer}:${POSTGRES_PASSWORD:-ai_reviewer}@postgres:5432/${POSTGRES_DB:-ai_code_reviewer}
      DATABASE_URL: mysql+aiomysql://root:root@mysql:3306/ai_code_reviewer
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
#    depends_on:
#      postgres:
#        condition: service_healthy
#      redis:
#        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\""]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - shared-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shared-network

volumes:
  postgres_data:
  redis_data:
  mysql_data:

networks:
  shared-network:     # 声明使用外部网络
    external: true    # 表示该网络已存在，Compose 不需要创建
