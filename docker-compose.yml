services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ai_reviewer
      POSTGRES_PASSWORD: ai_reviewer
      POSTGRES_DB: ai_code_reviewer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_reviewer -d ai_code_reviewer"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "if [ \"$${BACKEND_RELOAD:-false}\" = \"true\" ]; then
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload;
      else
      uvicorn app.main:app --host 0.0.0.0 --port 8000;
      fi"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ai_reviewer:ai_reviewer@postgres:5432/ai_code_reviewer
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
